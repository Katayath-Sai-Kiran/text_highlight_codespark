name: text_highlight_codespark
description: "Flutter widget for highlighting rich text — single query, multiple queries with per-term colors, regex patterns, tappable spans, and rounded-corner styling."
version: 2.1.0
homepage: https://github.com/Katayath-Sai-Kiran/text_highlight_codespark
repository: https://github.com/Katayath-Sai-Kiran/text_highlight_codespark
issue_tracker: https://github.com/Katayath-Sai-Kiran/text_highlight_codespark/issues

topics:
  - text-highlighting
  - multi-color-text
  - regex-highlight
  - highlight
  - rich-text

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

flutter:

screenshots:
  - description: 'Single Query Highlighting — highlights a single query within the source text.'
    path: assets/single_query.png
    width: 300

  - description: 'Multiple Queries Highlighting — highlights multiple queries with per-term colors.'
    path: assets/multiple_query.png
    width: 300

  - description: 'Regex Highlighting — uses regex patterns to highlight matches in the source text.'
    path: assets/regex_query.png
    width: 300
